name: Deploy to Serverless

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: '20'
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Serverless Framework globally
        run: npm install -g serverless

      - name: Configure Serverless for AWS-only deployment
        run: |
          echo "Configuring Serverless CLI to use AWS credentials (org/app disabled)"
          # Create a minimal .serverlessrc to disable Serverless Dashboard
          mkdir -p ~/.serverless
          echo "provider: aws" > ~/.serverless/config.yml

      - name: Create .env file for deployment
        run: |
          cat > .env << 'EOF'
          SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL || 'support@codexai.com' }}
          GMAIL_USER=${{ secrets.GMAIL_USER || 'codexaitechnologies@gmail.com' }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
          EOF
          echo "✅ .env file created"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          aws sts get-caller-identity
          echo "✅ AWS credentials verified"

      - name: Deploy to Serverless (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          echo "🚀 Deploying to Serverless Framework..."
          serverless deploy --stage production --verbose
        
      - name: Deployment Successful
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo "✅ Deployment completed successfully!"
          echo "API Endpoints:"
          serverless info --stage production

      - name: Deployment Failed
        if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
          exit 1

