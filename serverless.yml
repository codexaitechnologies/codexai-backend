# "org" ensures this Service is used with the correct Serverless Framework Access Key.
# Commented out for CI/CD - we authenticate using AWS credentials
# org: thevisionariesclub
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
# Commented out for CI/CD - we authenticate using AWS credentials
# app: codexai
# "service" is the name of this project. This will also be added to your AWS resource names.
service: codexai-backend

plugins:
  - serverless-dotenv-plugin
  - serverless-offline
  - serverless-prune-plugin

package:
  individually: false
  patterns:
    - '!node_modules/**'
    - '!layers/**'
    - '!.git/**'
    - '!docs/**'
    - '!.env.example'
    - '!README.md'
    - 'src/**'
    - 'handler.js'

custom:
  prune:
    automatic: true
    number: 3

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  environment:
    USERS_TABLE: codexai-users-${sls:stage}
    COURSES_TABLE: codexai-courses-${sls:stage}
    BROCHURES_TABLE: codexai-brochures-${sls:stage}
    PAYMENTS_TABLE: codexai-payments-${sls:stage}
    COUPONS_TABLE: codexai-coupons-${sls:stage}
    SUPPORT_TICKETS_TABLE: codexai-support-tickets-${sls:stage}
    BROCHURE_ENQUIRIES_TABLE: codexai-enquiries-${sls:stage}
    LEGALS_TABLE: codexai-legals-${sls:stage}
    NEWS_TABLE: codexai-news-${sls:stage}
    SUPPORT_DOCUMENTS_BUCKET: ${self:service}-support-documents-${sls:stage}
    SUPPORT_EMAIL: ${env:SUPPORT_EMAIL, 'codexaitechnologies@gmail.com'}
    ADMIN_EMAIL: ${env:ADMIN_EMAIL, 'codexaitechnologies@gmail.com'}
    GMAIL_USER: ${env:GMAIL_USER, 'codexaitechnologies@gmail.com'}
    GMAIL_APP_PASSWORD: ${env:GMAIL_APP_PASSWORD, 'dpgd vzxq pipd fmtz'}
    DEFAULT_BROCHURE_LINK: https://codexai.com/brochure.pdf
    COGNITO_USER_POOL_ID:
      Ref: CognitoUserPool
    COGNITO_CLIENT_ID:
      Ref: CognitoUserPoolClient

  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
        - http://localhost:5173
        - http://localhost:5174
        - https://codexai-65d23.web.app
        - https://codexai.co.in
        - https://www.codexai.co.in
        - https://codexai-admin.web.app
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Amz-Date
        - X-Api-Key
        - X-Amz-Security-Token
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true
      maxAge: 3600

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: 
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.USERS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.COURSES_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.BROCHURES_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.BROCHURES_TABLE}/index/*"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.PAYMENTS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.PAYMENTS_TABLE}/index/*"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.COUPONS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.SUPPORT_TICKETS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.SUPPORT_TICKETS_TABLE}/index/*"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.BROCHURE_ENQUIRIES_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.BROCHURE_ENQUIRIES_TABLE}/index/*"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.LEGALS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.NEWS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.NEWS_TABLE}/index/*"
        - Effect: Allow
          Action:
            - cognito-idp:SignUp
            - cognito-idp:InitiateAuth
            - cognito-idp:ConfirmSignUp
            - cognito-idp:ResendConfirmationCode
            - cognito-idp:ForgotPassword
            - cognito-idp:ConfirmForgotPassword
            - cognito-idp:GlobalSignOut
            - cognito-idp:GetUser
            - cognito-idp:GetUserAttributeVerificationCode
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:AdminUserGlobalSignOut
          Resource:
            - "arn:aws:cognito-idp:${aws:region}:${aws:accountId}:userpool/${aws:region}_*"
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - "arn:aws:s3:::${self:service}-support-documents-${sls:stage}/*"
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - "arn:aws:s3:::${self:service}-support-documents-${sls:stage}"

layers:
  dependencies:
    path: layers
    name: ${sls:stage}-codexai-dependencies
    description: CodexAI production Node.js dependencies
    compatibleRuntimes:
      - nodejs20.x
    retain: false

