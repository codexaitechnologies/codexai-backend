# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: thevisionariesclub
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: codexai
# "service" is the name of this project. This will also be added to your AWS resource names.
service: codexai-backend

plugins:
  - serverless-dotenv-plugin
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  environment:
    USERS_TABLE: users-${sls:stage}
    COURSES_TABLE: courses-${sls:stage}
    BROCHURES_TABLE: brochures-${sls:stage}
    GMAIL_USER: ${env:GMAIL_USER, 'codexaitechnologies@gmail.com'}
    GMAIL_APP_PASSWORD: ${env:GMAIL_APP_PASSWORD, 'dpgd vzxq pipd fmtz'}
    DEFAULT_BROCHURE_LINK: https://codexai.com/brochure.pdf

  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
        - http://localhost:5173
        - https://codexai-65d23.web.app
        - https://codexai.co.in
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Amz-Date
        - X-Api-Key
        - X-Amz-Security-Token
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true
      maxAge: 3600

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: 
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.USERS_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.COURSES_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.BROCHURES_TABLE}"
            - "arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.BROCHURES_TABLE}/index/*"

functions:
  createUser:
    handler: src/handlers/createUser.handler
    events:
      - httpApi:
          path: /users
          method: post

  getUser:
    handler: src/handlers/getUser.handler
    events:
      - httpApi:
          path: /users/{userId}
          method: get

  updateUser:
    handler: src/handlers/updateUser.handler
    events:
      - httpApi:
          path: /users/{userId}
          method: put

  deleteUser:
    handler: src/handlers/deleteUser.handler
    events:
      - httpApi:
          path: /users/{userId}
          method: delete

  listUsers:
    handler: src/handlers/listUsers.handler
    events:
      - httpApi:
          path: /users
          method: get

  createCourse:
    handler: src/handlers/createCourse.handler
    events:
      - httpApi:
          path: /courses
          method: post

  getCourse:
    handler: src/handlers/getCourse.handler
    events:
      - httpApi:
          path: /courses/{courseId}
          method: get

  updateCourse:
    handler: src/handlers/updateCourse.handler
    events:
      - httpApi:
          path: /courses/{courseId}
          method: put

  deleteCourse:
    handler: src/handlers/deleteCourse.handler
    events:
      - httpApi:
          path: /courses/{courseId}
          method: delete

  listCourses:
    handler: src/handlers/listCourses.handler
    events:
      - httpApi:
          path: /courses
          method: get

  createBrochure:
    handler: src/handlers/createBrochure.handler
    events:
      - httpApi:
          path: /brochures
          method: post

  getBrochure:
    handler: src/handlers/getBrochure.handler
    events:
      - httpApi:
          path: /brochures/{brochureId}
          method: get

  updateBrochure:
    handler: src/handlers/updateBrochure.handler
    events:
      - httpApi:
          path: /brochures/{brochureId}
          method: put

  deleteBrochure:
    handler: src/handlers/deleteBrochure.handler
    events:
      - httpApi:
          path: /brochures/{brochureId}
          method: delete

  listBrochures:
    handler: src/handlers/listBrochures.handler
    events:
      - httpApi:
          path: /brochures
          method: get

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH

    CoursesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.COURSES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: courseId
            AttributeType: S
        KeySchema:
          - AttributeName: courseId
            KeyType: HASH

    BrochuresTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.BROCHURES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: brochureId
            AttributeType: S
          - AttributeName: courseId
            AttributeType: S
        KeySchema:
          - AttributeName: brochureId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: courseId-index
            KeySchema:
              - AttributeName: courseId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
