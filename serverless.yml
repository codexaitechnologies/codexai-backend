  updateCourse:
    handler: src/handlers/updateCourse.handler
    events:
      - httpApi:
          path: /courses/{courseId}
          method: put

  deleteCourse:
    handler: src/handlers/deleteCourse.handler
    events:
      - httpApi:
          path: /courses/{courseId}
