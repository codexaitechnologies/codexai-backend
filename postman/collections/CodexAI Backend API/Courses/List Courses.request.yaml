$kind: http-request
description: Retrieves a paginated list of all courses with optional filtering
  and pagination support
url: "{{base_url}}/courses?limit=10"
method: GET
headers:
  Content-Type: application/json
queryParams:
  - key: limit
    value: "10"
    description: "Number of items to return (default: 10, max: 100)"
  - key: flagship
    value: "true"
    disabled: true
    description: Filter to only flagship courses (true/false)
  - key: lastEvaluatedKey
    value: ""
    disabled: true
    description: Base64-encoded key for pagination
order: 5000
